<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D Панорама</title>
    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #000; }
        #viewer { width: 100%; height: 100%; position: absolute; top:0; left:0; }
        canvas { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>

    <div id="viewer"></div>

    <script>
    // Встроенный автономный плеер сферических панорам (HTML5 Canvas)
    class PanoramaViewer {
        constructor(options) {
            this.container = options.container;
            this.imageSrc = options.image;
            this.canvas = document.createElement('canvas');
            this.ctx = this.canvas.getContext('2d');
            this.container.appendChild(this.canvas);
            this.img = new Image();
            this.img.onload = () => { this.init(); this.animate(); };
            this.img.src = this.imageSrc;
            this.lon = 0; this.lat = 0;
            this.isUserInteracting = false;
            this.onPointerDownPointerX = 0; this.onPointerDownPointerY = 0;
            this.onPointerDownLon = 0; this.onPointerDownLat = 0;
            this.fov = 75;
        }
        init() {
            this.resize();
            window.addEventListener('resize', () => this.resize());
            this.container.addEventListener('pointerdown', (e) => this.onPointerDown(e));
            this.container.addEventListener('pointermove', (e) => this.onPointerMove(e));
            window.addEventListener('pointerup', () => this.onPointerUp());
            this.container.addEventListener('wheel', (e) => this.onDocumentMouseWheel(e));
        }
        resize() {
            this.width = this.container.clientWidth;
            this.height = this.container.clientHeight;
            this.canvas.width = this.width;
            this.canvas.height = this.height;
        }
        onPointerDown(e) {
            this.isUserInteracting = true;
            this.onPointerDownPointerX = e.clientX;
            this.onPointerDownPointerY = e.clientY;
            this.onPointerDownLon = this.lon;
            this.onPointerDownLat = this.lat;
        }
        onPointerMove(e) {
            if (!this.isUserInteracting) return;
            this.lon = (this.onPointerDownPointerX - e.clientX) * 0.15 + this.onPointerDownLon;
            this.lat = (e.clientY - this.onPointerDownPointerY) * 0.15 + this.onPointerDownLat;
            this.lat = Math.max(-85, Math.min(85, this.lat));
        }
        onPointerUp() { this.isUserInteracting = false; }
        onDocumentMouseWheel(e) {
            this.fov += e.deltaY * 0.05;
            this.fov = Math.max(30, Math.min(100, this.fov));
        }
        animate() {
            requestAnimationFrame(() => this.animate());
            this.render();
        }
        render() {
            if (!this.img.complete) return;
            this.ctx.clearRect(0, 0, this.width, this.height);
            this.ctx.save();
            this.ctx.translate(this.width / 2, this.height / 2);
            const sw = this.width * (90 / this.fov);
            const sh = this.height * (90 / this.fov);
            let tx = ((this.lon % 360) / 360) * sw * 4;
            let ty = (this.lat / 90) * (sh / 2);
            this.ctx.drawImage(this.img, -sw/2 - tx, -sh/2 + ty, sw * 4, sh);
            this.ctx.drawImage(this.img, -sw/2 - tx + sw * 4, -sh/2 + ty, sw * 4, sh);
            this.ctx.drawImage(this.img, -sw/2 - tx - sw * 4, -sh/2 + ty, sw * 4, sh);
            this.ctx.restore();
        }
    }

    // Запуск панорамы
    window.addEventListener('DOMContentLoaded', () => {
        new PanoramaViewer({
            container: document.getElementById('viewer'),
            image: 'pano.jpg'
        });
    </script>
</body>
</html>
