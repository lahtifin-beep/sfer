<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D Панорама</title>
    <!-- Подключение надежного мирового плеера панорам -->
    <link rel="stylesheet" href="https://cloudflare.com" />
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>
    <style>
        html, body, #viewer { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #000; }
    </style>
</head>
<body>

    <div id="viewer"></div>

    <script>
        // Запуск панорамы из одной сферической картинки
        const viewer = new PhotoSphereViewer.Viewer({
            container: document.getElementById('viewer'),
            panorama: 'pano.jpg', 
            defaultMinFov: 30,    
            defaultMaxFov: 90,    
            defaultFov: 70,       
            navbar: false         
        });
    </script>
</body>
</html>
