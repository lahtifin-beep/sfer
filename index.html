<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D Панорама</title>
    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #000; }
        #viewer { width: 100%; height: 100%; position: absolute; top:0; left:0; }
    </style>
    <!-- Подключаем ваш файл sphera.js -->
    <script src="sphera.js"></script>
</head>
<body>
    <div id="viewer"></div>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            // Запуск нашего нового автономного плеера
            if (typeof PanoramaViewer !== 'undefined') {
                new PanoramaViewer({
                    container: document.getElementById('viewer'),
                    image: 'pano.jpg'
                });
            } else {
                document.body.innerHTML = "<div style='color:white;text-align:center;padding:20px;'>Файл sphera.js еще не загрузился или пустой.</div>";
            }
        });
    </script>
</body>
</html>
